aid: kavak
name: Kavak
description: >-
  Kavak is a Mexico-founded digital marketplace for buying, selling, and
  financing pre-owned cars across Latin America, the Middle East, and Turkey.
  Founded in 2016 in Mexico City by Carlos Garcia Ottati, Loreanne Garcia
  Ottati, and Roger Laughlin, Kavak became Mexico's first unicorn in 2020 and
  reached an $8.7B valuation in 2021 with backing from SoftBank, Sea Ltd, and
  Founders Fund. The company operates an end-to-end consumer platform that
  combines an e-commerce site and mobile app, physical hubs, in-house vehicle
  reconditioning, and a financial-services arm (Kavak Capital, Kuna, and Kavak
  Credito). Internally, Kavak uses machine learning and proprietary pricing
  models to value, inspect, and route inventory across markets including
  Mexico, Argentina, Brazil, Chile, the United Arab Emirates, and Turkey,
  while sponsoring high-profile partners such as the NFL. Kavak's revenue
  comes from vehicle sales, financing margins, and after-sales services, and
  the company does not currently publish a public developer API, SDK, OpenAPI
  specification, or open-source GitHub organization. Customer-facing
  integrations are limited to the consumer web and mobile apps and partner
  financing channels.
